spring.application.name=diagnostic-backend
spring.profiles.default=postgres
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

app.security.admin.username=${ADMIN_USERNAME:admin}
app.security.admin.password=${ADMIN_PASSWORD:change-me-now}
app.speedtest.ookla.binary-path=${OOKLA_CLI_BINARY:speedtest}
app.speedtest.ookla.server-id=${OOKLA_SERVER_ID:35474}
app.speedtest.ookla.provider-label=${OOKLA_PROVIDER_LABEL:Ookla CLI / InfinityGO Telecom}
app.speedtest.ookla.region-label=${OOKLA_REGION_LABEL:Caldas Novas/GO}
app.speedtest.ookla.timeout-seconds=${OOKLA_TIMEOUT_SECONDS:90}

server.error.include-message=always
